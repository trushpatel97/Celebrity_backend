databases:
  - name: celebritydb
    databaseName: celebrity_db
    user: celebrity_user
    plan: free

services:
  - type: web
    name: celebrity-backend
    env: node
    buildCommand: npm install && npm run knex:migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: celebritydb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://your-frontend-domain.com"
    plan: free
